about:
  text: >
    <p>
      Компанія <strong class="text-uppercase grey--text">
      <span class="font-weight-light" style="color: #7A7A7A;"> Happy</span>
      <span style="color: #FED100;">link</span>
      </strong> надає доступ до мережі інтернет за технологією FTTB (Fiber to the Building). Ця система заснована на застосуванні оптичного волокна, по якому сигнал розповсюджується практично без втрат і не має зовнішнього впливу. Оптоволокно прокладається до багатоквартирного будинку, де через термінал сигнал розділяється до кожного абонента, потрапляючи до квартири вже через звичайний кабель.
    </p>
    <p>
      Його перевагами, в порівнянні з іншими, можливими, структурами являються:
    </p>
    <ul>
      <li>відсутність необхідності в купівлі модему або будь-якого іншого обладнання;</li>
      <li>найбільша швидкість доступу - до 1000 Мбіт/сек;</li>
      <li>стабільність і надійність зв'язку;</li>
      <li>висока водозахищеність (оптоволоконна лінія не боїться блискавок і радіовипромінювань, на неї не діють електромагнітні наводки від силового кабелю);</li>
      <li>великий строк експлуатації лінії (оптоволокно захищене від впливу агресивного середовища і не окисляється від вологи);</li>
      <li>до кожного терміналу (абонентського комутатора) в будинку прокладається окремий оптичний кабель від ядра мережі.</li>
    </ul>
    <p>
      Наша мережа побудована за топологією "зірка" і забезпечує відсутність зменшення швидкості з'єднання при будь-якій кількості абонентів, а також високу надійність.
    </p>
    <style scoped>
      p {margin-bottom: 16px; font-size: 16px;}
      ul {margin-bottom: 16px; padding-left: 20px;}
    </style>

