  text: >
    <h3>Інтернет-провайдер HappyLink</h3>
    <p>
      Запрошуємо вас вибрати надійного інтернет-провайдера - HappyLink.
      Наша мережа охоплює (жк "Щасливий", жк "Вишнева Оселя", жк "Барселона" та ін.), забезпечуючи стабільне підключення і чітку телетрансляцію.
      Ми гарантуємо якісний сигнал і надійне обслуговування для всіх наших абонентів.
      Замовляйте підключення до інтернету та цифрового телебачення в HappyLink - ми виконуємо свої зобов'язання перед вами без перебільшень.
      Приєднуйтесь до нашої мережі вже сьогодні і переконайтеся в надійності і якості обслуговування!
    </p>
