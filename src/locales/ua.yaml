  external-ip: "Зовнішній IP"
  to-buy: "Замовити"
  rates: "Тариф"
  total: "Разом"
  ethernet-text: >
    Ethernet — це технологія локальної мережі (LAN), яка використовується для підключення комп'ютерів і інших пристроїв до мережі. Основні характеристики Ethernet включають використання кабелів для передачі даних, метод доступу CSMA/CD, швидкість передачі даних від 10 Мбіт/с до 100 Гбіт/с і більше.
  pon-text: >
    PON (Passive Optical Network) — це технологія пасивної оптичної мережі, яка використовується для забезпечення високошвидкісного інтернет-з'єднання. PON використовує пасивні компоненти для розподілу оптичного сигналу від одного джерела до кількох абонентів. PON забезпечує високу швидкість передачі даних до 10 Гбіт/с.
  snackbar-text: >
    <h2>Зовнішня IP-адреса</h2>
    <p>(або публічна IP-адреса) — це унікальний ідентифікатор вашого пристрою в інтернеті, який надається вашим інтернет-провайдером.</p>
    <h4>Основні особливості:</h4>
    <ul>
      <li><strong>Унікальність</strong>: Кожна зовнішня IP-адреса унікальна.</li>
      <li><strong>Доступність</strong>: Вона дозволяє іншим пристроям в інтернеті знаходити ваш пристрій.</li>
      <li><strong>Типи</strong>: Статична (постійна) або динамічна (змінюється з часом).</li>
    </ul>

