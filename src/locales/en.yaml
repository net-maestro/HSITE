about:
  text: >
    <p>
      Company <strong class="text-uppercase gray--text">
      <span class="font-weight-light" style="color: #7A7A7A;"> Happy</span>
      <span style="color: #FED100;">link</span>
      </strong> provides access to the Internet using FTTB (Fiber to the Building) technology.
      This system is based on the use of an optical fiber, through which the signal spreads almost without loss and has no external influence.
      An optical fiber is laid to an apartment building, where the signal is distributed to each subscriber through a terminal, reaching the apartment already through an ordinary cable.
    </p>
    <p>Its advantages compared to other possible structures are:</p>
    <ul>
      <li>no need to purchase a modem or any other equipment;</li>
      <li>the highest access speed is up to 1000 Mbit/s;</li>
      <li>stability and reliability of communication;</li>
      <li>high water resistance (the optical fiber line is not afraid of lightning and radio radiation, it is not affected by electromagnetic interference from the power cable);</li>
      <li>a long service life of the line (optical fiber is protected from the influence of an aggressive environment and does not oxidize from moisture);</li>
      <li>a separate optical cable from the network core is laid to each terminal (subscriber switch) in the house.</li>
    </ul>
    <p>
      Our network is built according to the "star" topology and ensures no reduction in connection speed with any number of subscribers, as well as high reliability.
    </p>
    <style scoped>
      p {margin-bottom: 16px; font-size: 16px;}
      ul {margin-bottom: 16px; padding-left: 20px;}
    </style>

