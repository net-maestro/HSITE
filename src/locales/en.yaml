  ethernet-text: >
    Ethernet is a local area network (LAN) technology used to connect computers and other devices to a network. The main characteristics of Ethernet include the use of cables for data transmission, the CSMA/CD access method, data transfer rates from 10 Mbit/s to 100 Gbit/s and more.
  pon-text: >
    PON (Passive Optical Network) is a passive optical network technology used to provide a high-speed Internet connection. A PON uses passive components to distribute an optical signal from a single source to multiple subscribers. PON provides a high data transfer rate of up to 10 Gbit/s.
  snackbar-text: >
    <h2>External IP address</h2>
    <p>(or public IP address) is your device's unique identifier on the Internet, provided by your ISP.</p>
    <h4>Key features:</h4>
    <ul>
      <li><strong>Uniqueness</strong>: Each external IP address is unique.</li>
      <li><strong>Accessibility</strong>: It allows other devices on the Internet to find your device.</li>
      <li><strong>Types</strong>: Static (constant) or dynamic (changing over time).</li>
    </ul>

